<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Recipes</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="page page-top">
    <div class="card wide-card">
        <h1>All Recipes</h1>
        <p>Recipes are read from the local XML file and displayed in memory.</p>

        <a class="back-link" href="/">Back to home</a>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Cuisine 1</th>
                <th>Cuisine 2</th>
                <th>Difficulty</th>
                <th>Details</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="recipe : ${recipes}">
                <td th:text="${recipe.id}"></td>
                <td th:text="${recipe.title}"></td>
                <td th:text="${recipe.cuisine1}"></td>
                <td th:text="${recipe.cuisine2}"></td>
                <td th:text="${recipe.difficulty}"></td>
                <td>
                    <a th:href="@{/recipe/{id}(id=${recipe.id})}">View</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
